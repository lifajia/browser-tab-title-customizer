<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Title Customizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <img class="header__icon" src="icons/icon16.png" width="20" height="20" alt="">
      <span class="header__title" data-i18n="extTitle"></span>
    </div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button type="button" class="lang-switch__btn" data-locale="auto" data-i18n="langAuto"></button>
      <button type="button" class="lang-switch__btn" data-locale="zh_CN" data-i18n="langZh"></button>
      <button type="button" class="lang-switch__btn" data-locale="en" data-i18n="langEn"></button>
    </div>
  </header>

  <main class="popup">
    <section class="card">
      <p id="siteDomain" class="site-domain">example.com</p>

      <div class="card-section">
        <span class="field__label" data-i18n="matchModeLabel"></span>
        <div id="modeGroup" class="mode-group" role="radiogroup" data-i18n-aria="matchModeAria">
          <label class="mode-option">
            <input type="radio" name="matchMode" value="prefix" checked>
            <span data-i18n="modePrefix"></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="matchMode" value="suffix">
            <span data-i18n="modeSuffix"></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="matchMode" value="contains">
            <span data-i18n="modeContains"></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="matchMode" value="regex">
            <span data-i18n="modeRegex"></span>
          </label>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-section">
        <label class="field">
          <span id="patternLabel" class="field__label"></span>
          <input id="patternInput" class="field__input" type="text">
          <span id="patternHint" class="field__hint"></span>
        </label>
      </div>

      <div class="card-divider"></div>

      <div class="card-section">
        <span class="field__label" data-i18n="titleLabel"></span>
        <div class="title-row">
          <input id="titleInput" class="field__input title-row__input" type="text" maxlength="40" data-i18n-placeholder="titlePlaceholder">
          <button
            id="resetBtn"
            class="btn btn--icon"
            type="button"
            data-i18n-title="resetTooltip"
            data-i18n-aria="resetTooltip"
          >
            <img class="btn__icon" src="icons/icon-reset.svg" width="16" height="16" alt="">
          </button>
        </div>
        <span id="titleCounter" class="field__hint field__hint--right">0 / 40</span>
      </div>

      <div class="card-divider"></div>

      <div id="bookmarkSection" class="card-section bookmark-section">
        <span class="field__label" data-i18n="bookmarkFolderLabel"></span>

        <label id="folderField" class="field field--compact">
          <select id="folderSelect" class="field__input"></select>
        </label>

        <div id="bookmarkStatus" class="bookmark-status" hidden>
          <p id="bookmarkPath" class="bookmark-path" hidden></p>
          <p id="statusHint" class="bookmark-hint"></p>
        </div>
      </div>

      <p id="mappingHint" class="mapping-hint" hidden></p>

      <button id="saveBtn" class="btn btn--primary" type="button" data-i18n="saveBtn"></button>
      <p id="message" class="message" hidden></p>
    </section>

    <footer class="popup-footer">
      <div class="popup-footer__links">
        <a
          id="githubLink"
          class="popup-footer__link"
          href="https://github.com/lifajia/browser-tab-title-customizer"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n-aria="linkGithub"
        >
          <svg class="popup-footer__svg" viewBox="0 0 16 16" aria-hidden="true">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <a
          id="readmeLink"
          class="popup-footer__link"
          href="https://github.com/lifajia/browser-tab-title-customizer#readme"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n-aria="linkReadme"
        >
          <svg class="popup-footer__svg" viewBox="0 0 16 16" aria-hidden="true">
            <path fill="currentColor" d="M3 1.5A1.5 1.5 0 0 1 4.5 0h5.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12A1.5 1.5 0 0 1 14 3.622V12.5A1.5 1.5 0 0 1 12.5 14h-8A1.5 1.5 0 0 1 3 12.5v-11zM4.5 1a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5V4h-2.5A1.5 1.5 0 0 1 9 2.5V0H4.5zm4 0v2.5a.5.5 0 0 0 .5.5H11L8.5 1zM5 6.75A.75.75 0 0 1 5.75 6h4.5a.75.75 0 0 1 0 1.5h-4.5A.75.75 0 0 1 5 6.75zm0 2.5a.75.75 0 0 1 .75-.75h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1-.75-.75zm0 2.5a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75z"/>
          </svg>
        </a>
      </div>
      <span class="popup-footer__version" data-i18n-version="footerVersion">v1.0</span>
    </footer>
  </main>

  <script src="lib/matcher.js"></script>
  <script src="lib/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
